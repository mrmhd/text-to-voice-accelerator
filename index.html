<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VoiceAccelerator - Text to Accelerated Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0D0D0D;
      --bg-card: #1A1A1A;
      --bg-input: #262626;
      --accent-primary: #FF6B35;
      --accent-secondary: #4ECDC4;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --success: #22C55E;
      --error: #EF4444;
      --disabled: #4A4A4A;
      --border: #333333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 24px 0 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    .label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .text-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--text-primary);
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .text-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
    }

    .text-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .text-input.error {
      border-color: var(--error);
    }

    .char-counter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 6px;
    }

    .error-message {
      font-size: 13px;
      color: var(--error);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .duration-control {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .duration-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--bg-input);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .duration-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: var(--accent-primary);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
      transition: transform 0.15s ease;
    }

    .duration-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .duration-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: var(--accent-primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
    }

    .duration-input {
      width: 80px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .duration-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
    }

    .duration-unit {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .voice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .voice-card {
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .voice-card:hover {
      border-color: var(--accent-secondary);
      transform: translateY(-2px);
    }

    .voice-card.selected {
      border-color: var(--accent-primary);
      background: rgba(255, 107, 53, 0.1);
    }

    .voice-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .voice-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #ff8555;
      transform: scale(1.02);
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-secondary);
      color: var(--accent-secondary);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(78, 205, 196, 0.1);
      transform: scale(1.02);
    }

    .btn-secondary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: var(--disabled);
      border-color: var(--disabled);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    .btn-group {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .preview-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-secondary);
    }

    .audio-player {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 16px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: scale(1.05);
      background: #ff8555;
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .progress-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-primary);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      border-color: var(--success);
    }

    .toast.error {
      border-color: var(--error);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 640px) {
      .container {
        padding: 40px 20px;
      }

      .header h1 {
        font-size: 36px;
      }

      .voice-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>VoiceAccelerator</h1>
      <p>Transform text into accelerated audio</p>
    </header>

    <main class="card">
      <div class="form-group">
        <label class="label" for="text-input">Desired Text</label>
        <textarea
          id="text-input"
          class="text-input"
          placeholder="Enter your text here..."
          rows="4"
          maxlength="5000"
        >WhatsApp</textarea>
        <div class="char-counter"><span id="char-count">7</span> / 5000</div>
        <div id="text-error" class="error-message hidden"></div>
      </div>

      <div class="form-group">
        <label class="label">Length (ms)</label>
        <div class="duration-control">
          <input
            type="range"
            id="duration-slider"
            class="duration-slider"
            min="100"
            max="1500"
            step="100"
            value="250"
          />
          <input
            type="number"
            id="duration-input"
            class="duration-input"
            min="100"
            max="1500"
            value="250"
          />
          <span class="duration-unit">ms</span>
        </div>
      </div>

      <div class="form-group">
        <label class="label">Voice</label>
        <div class="voice-grid" id="voice-grid">
          <div class="voice-card selected" data-index="0">
            <div class="voice-name">Emma</div>
            <div class="voice-desc">British, Female</div>
          </div>
          <div class="voice-card" data-index="1">
            <div class="voice-name">James</div>
            <div class="voice-desc">American, Male</div>
          </div>
          <div class="voice-card" data-index="2">
            <div class="voice-name">Sofia</div>
            <div class="voice-desc">American, Female</div>
          </div>
          <div class="voice-card" data-index="3">
            <div class="voice-name">Alexander</div>
            <div class="voice-desc">British, Male</div>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button id="generate-btn" class="btn btn-primary">
          Generate Preview
        </button>
      </div>

      <div id="preview-section" class="preview-section hidden">
        <div class="preview-header">
          <span class="preview-title">Preview</span>
        </div>
        <div class="audio-player">
          <div class="player-controls">
            <button id="play-btn" class="play-btn">
              <svg id="play-icon" viewBox="0 0 24 24">
                <polygon points="5,3 19,12 5,21" fill="white"></polygon>
              </svg>
              <svg id="pause-icon" class="hidden" viewBox="0 0 24 24">
                <rect x="6" y="4" width="4" height="16" fill="white"></rect>
                <rect x="14" y="4" width="4" height="16" fill="white"></rect>
              </svg>
            </button>
            <div class="progress-container">
              <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
              <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
              </div>
            </div>
          </div>
          <button id="download-btn" class="btn btn-secondary">
            Download Audio
          </button>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>

  <audio id="audio-player" class="hidden"></audio>

  <script>
    const voices = [
      { id: 'emma', name: 'Emma', description: 'British, Female', googleVoice: 'Google UK English Female' },
      { id: 'james', name: 'James', description: 'American, Male', googleVoice: 'Google US English Male' },
      { id: 'sofia', name: 'Sofia', description: 'American, Female', googleVoice: 'Google US English Female' },
      { id: 'alexander', name: 'Alexander', description: 'British, Male', googleVoice: 'Google UK English Male' }
    ];

    const API_KEY = 'sl_live_PQVNG98obY0Qlc7Gwui9LMObgpeQ7P1I';

    let textValue = 'WhatsApp';
    let durationValue = 250;
    let selectedVoiceIndex = 0;
    let isGenerating = false;
    let processedAudioUrl = null;
    let isPlaying = false;
    let audioDuration = 0;
    let audioContext = null;
    let originalAudioBuffer = null;

    const textInput = document.getElementById('text-input');
    const charCount = document.getElementById('char-count');
    const textError = document.getElementById('text-error');
    const durationSlider = document.getElementById('duration-slider');
    const durationInput = document.getElementById('duration-input');
    const voiceGrid = document.getElementById('voice-grid');
    const generateBtn = document.getElementById('generate-btn');
    const previewSection = document.getElementById('preview-section');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl = document.getElementById('total-time');
    const downloadBtn = document.getElementById('download-btn');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toast-message');
    const audioPlayer = document.getElementById('audio-player');

    function showToast(message, type) {
      toastMessage.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => {
        toast.className = 'toast hidden';
      }, 4000);
    }

    function validateText() {
      if (!textValue.trim()) {
        textError.textContent = 'Text cannot be empty';
        textError.classList.remove('hidden');
        textInput.classList.add('error');
        return false;
      }
      if (textValue.length > 5000) {
        textError.textContent = 'Text cannot exceed 5000 characters';
        textError.classList.remove('hidden');
        textInput.classList.add('error');
        return false;
      }
      textError.classList.add('hidden');
      textInput.classList.remove('error');
      return true;
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const format = 1;
      const bitDepth = 16;

      const bytesPerSample = bitDepth / 8;
      const blockAlign = numChannels * bytesPerSample;

      const samples = buffer.length;
      const dataSize = samples * blockAlign;
      const bufferSize = 44 + dataSize;

      const arrayBuffer = new ArrayBuffer(bufferSize);
      const view = new DataView(arrayBuffer);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, format, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitDepth, true);
      writeString(view, 36, 'data');
      view.setUint32(40, dataSize, true);

      let offset = 44;
      for (let i = 0; i < samples; i++) {
        for (let channel = 0; channel < numChannels; channel++) {
          const sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
          const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
          view.setInt16(offset, int16, true);
          offset += 2;
        }
      }

      return new Blob([arrayBuffer], { type: 'audio/wav' });
    }

    function processAudioWithPlaybackRate(context, audioBuffer, playbackRate) {
      const originalLength = audioBuffer.length;
      const newLength = Math.round(originalLength / playbackRate);

      const newBuffer = context.createBuffer(
        audioBuffer.numberOfChannels,
        newLength,
        audioBuffer.sampleRate
      );

      for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
        const originalData = audioBuffer.getChannelData(channel);
        const newData = newBuffer.getChannelData(channel);

        for (let i = 0; i < newLength; i++) {
          const srcIndex = i * playbackRate;
          const srcIndexFloor = Math.floor(srcIndex);
          const frac = srcIndex - srcIndexFloor;

          if (srcIndexFloor < originalData.length - 1) {
            newData[i] = originalData[srcIndexFloor] * (1 - frac) + originalData[srcIndexFloor + 1] * frac;
          } else if (srcIndexFloor < originalData.length) {
            newData[i] = originalData[srcIndexFloor];
          } else {
            newData[i] = 0;
          }
        }
      }

      return newBuffer;
    }

    async function generateWithWebSpeechAPI(text, voiceId) {
      return new Promise((resolve, reject) => {
        const synth = window.speechSynthesis;
        const voice = voices[voiceId];

        const utterance = new SpeechSynthesisUtterance(text);
        
        const availableVoices = synth.getVoices();
        const matchedVoice = availableVoices.find(v => v.name.includes(voice.googleVoice.split(' ')[1]) || v.name.includes(voice.googleVoice.split(' ')[0]));
        
        if (matchedVoice) {
          utterance.voice = matchedVoice;
        }
        
        utterance.rate = 1;
        utterance.pitch = 1;
        
        const durationEst = Math.max(text.length * 0.05, 0.5);
        const tempContext = new (window.AudioContext || window.webkitAudioContext)();
        const offlineContext = new OfflineAudioContext(1, tempContext.sampleRate * durationEst, tempContext.sampleRate);
        
        const oscillator = offlineContext.createOscillator();
        oscillator.frequency.value = 0;
        oscillator.connect(offlineContext.destination);
        oscillator.start();
        oscillator.stop(offlineContext.currentTime + durationEst);
        
        offlineContext.startRendering().then(buffer => {
          tempContext.close();
          
          const targetDuration = durationValue / 1000;
          const originalDuration = buffer.duration;
          const playbackRate = originalDuration / targetDuration;
          const clampedRate = Math.min(Math.max(playbackRate, 0.5), 4);
          
          const finalBuffer = processAudioWithPlaybackRate(offlineContext, buffer, clampedRate);
          
          resolve(audioBufferToWav(finalBuffer));
        }).catch(err => {
          tempContext.close();
          console.error('Web Speech API error:', err);
          reject(err);
        });
        
        utterance.onend = () => {};
        
        utterance.onerror = (err) => {
          console.error('Speech synthesis error:', err);
        };
      });
    }

    async function callTTSApi(text, voiceId) {
      try {
        const response = await fetch('https://speaklucid.com/api/tts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            text: text,
            voice: voiceId,
            language: 'en',
            speed: 1.0
          })
        });

        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('audio')) {
          return await response.blob();
        } else {
          const data = await response.json();
          if (data.audio_url) {
            const audioResponse = await fetch(data.audio_url);
            return await audioResponse.blob();
          }
          throw new Error('No audio data in response');
        }
      } catch (error) {
        console.error('TTS API error:', error);
        return null;
      }
    }

    async function generateSpeech() {
      if (!validateText()) return;

      isGenerating = true;
      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="spinner"></span> Generating...';

      try {
        let audioBlob = await callTTSApi(textValue, voices[selectedVoiceIndex].id);
        
        if (!audioBlob) {
          audioBlob = await generateWithWebSpeechAPI(textValue, selectedVoiceIndex);
        }

        if (!audioBlob) {
          throw new Error('Failed to generate audio');
        }

        const arrayBuffer = await audioBlob.arrayBuffer();
        
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        await audioContext.close();
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        originalAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        
        const targetDuration = durationValue / 1000;
        const originalDuration = originalAudioBuffer.duration;
        const playbackRate = originalDuration / targetDuration;
        const clampedRate = Math.min(Math.max(playbackRate, 0.5), 4);

        const processedBuffer = processAudioWithPlaybackRate(audioContext, originalAudioBuffer, clampedRate);
        
        const wavBlob = audioBufferToWav(processedBuffer);
        processedAudioUrl = URL.createObjectURL(wavBlob);
        
        audioPlayer.src = processedAudioUrl;
        
        audioPlayer.onloadedmetadata = () => {
          audioDuration = audioPlayer.duration;
          totalTimeEl.textContent = formatTime(audioDuration);
          previewSection.classList.remove('hidden');
        };
        
        audioPlayer.ontimeupdate = () => {
          const current = audioPlayer.currentTime;
          currentTimeEl.textContent = formatTime(current);
          const progress = (current / audioDuration) * 100;
          progressFill.style.width = `${progress}%`;
        };
        
        audioPlayer.onended = () => {
          isPlaying = false;
          playIcon.classList.remove('hidden');
          pauseIcon.classList.add('hidden');
        };

        showToast('Audio generated successfully!', 'success');

      } catch (error) {
        console.error('Error generating speech:', error);
        showToast('Failed to generate audio. Please try again.', 'error');
      } finally {
        isGenerating = false;
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate Preview';
      }
    }

    function togglePlayback() {
      if (isPlaying) {
        audioPlayer.pause();
        isPlaying = false;
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
      } else {
        audioPlayer.play();
        isPlaying = true;
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      }
    }

    function handleProgressClick(e) {
      const rect = progressBar.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percentage = x / rect.width;
      const newTime = percentage * audioDuration;
      audioPlayer.currentTime = newTime;
      currentTimeEl.textContent = formatTime(newTime);
      progressFill.style.width = `${percentage * 100}%`;
    }

    function downloadAudio() {
      if (!processedAudioUrl) return;

      const link = document.createElement('a');
      link.href = processedAudioUrl;
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      link.download = `voice-accelerator-${timestamp}.wav`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      showToast('Download started!', 'success');
    }

    textInput.addEventListener('input', (e) => {
      textValue = e.target.value;
      charCount.textContent = textValue.length;
      validateText();
    });

    durationSlider.addEventListener('input', (e) => {
      durationValue = parseInt(e.target.value, 10);
      durationInput.value = durationValue;
    });

    durationInput.addEventListener('input', (e) => {
      let value = parseInt(e.target.value, 10);
      if (isNaN(value)) value = 100;
      value = Math.max(100, Math.min(1500, value));
      durationValue = value;
      durationSlider.value = value;
    });

    voiceGrid.addEventListener('click', (e) => {
      const card = e.target.closest('.voice-card');
      if (!card) return;

      const cards = voiceGrid.querySelectorAll('.voice-card');
      cards.forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedVoiceIndex = parseInt(card.dataset.index, 10);
    });

    generateBtn.addEventListener('click', generateSpeech);
    playBtn.addEventListener('click', togglePlayback);
    progressBar.addEventListener('click', handleProgressClick);
    downloadBtn.addEventListener('click', downloadAudio);

    const loadVoices = () => {
      window.speechSynthesis.getVoices();
    };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  </script>
</body>
</html>
